# Qwen3.5-27B GRPO Configuration
# Single GPU H100/A100 80GB — MegaTrain + VERL backend
#
# Usage:
#   python examples/rl/train_grpo.py --config examples/rl/configs/qwen3_5_27b_grpo.yaml

model:
  name: "Qwen/Qwen3.5-27B"
  dtype: "bfloat16"
  device: 0
  attn_implementation: "flash_attention_2"
  trust_remote_code: true

dataset:
  # GSM8K for math reasoning RL
  name: "gsm8k"
  # Or use local path:
  # path: "/path/to/gsm8k/train.parquet"
  max_seq_len: 1024
  max_prompt_len: 256
  max_response_len: 768

grpo:
  num_prompts_per_batch: 4       # number of distinct prompts per step
  n_rollouts_per_prompt: 4       # group size (responses per prompt)
  # effective batch_size = num_prompts_per_batch * n_rollouts_per_prompt = 16
  clip_range: 0.2
  kl_loss_coef: 0.001
  kl_loss_type: "kl"             # "kl", "low_var_kl", "mse", "abs"
  advantage_norm: true            # normalize advantages by group std

training:
  num_steps: 200
  learning_rate: 1.0e-6
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  type: "deepspeed_adam"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 4
  num_grad_slabs: 12

logging:
  log_interval: 1
  enable_timing: true
