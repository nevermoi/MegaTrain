# Llama 3.1 8B Model Configuration

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  device: 0
  attn_implementation: "flash_attention_2"
  trust_remote_code: false

dataset:
  path: "dataset/Math/train"
  max_seq_len: 1024
  num_workers: 4
  query_field: "query"
  response_field: "response"

training:
  batch_size: 148
  gradient_accumulation_steps: 1
  num_steps: 1000
  learning_rate: 2.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  type: "deepspeed_adam"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 4
  num_grad_slabs: 12

logging:
  log_interval: 1
  enable_timing: true
