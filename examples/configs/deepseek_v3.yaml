# DeepSeek-V3 (MoE, 671B total / ~37B active)
#
# Architecture: Dense attention + MoE MLP, 256 experts
# WARNING: Requires ~2.5TB+ CPU RAM for FP32 master weights
# Requires: transformers >= 4.51, trust_remote_code=true

model:
  name: "deepseek-ai/DeepSeek-V3-0324"
  dtype: "bfloat16"
  device: 0
  attn_implementation: "flash_attention_2"
  trust_remote_code: true

dataset:
  path: "dataset/Math/train"
  max_seq_len: 512
  num_workers: 2
  query_field: "query"
  response_field: "response"

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  num_steps: 100
  learning_rate: 2.0e-6
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  type: "deepspeed_adam"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 2
  num_grad_slabs: 6

logging:
  log_interval: 1
  enable_timing: true
