# Yi 1.5 34B Model Configuration

model:
  name: "01-ai/Yi-1.5-34B-Chat"
  dtype: "bfloat16"
  device: 0
  attn_implementation: "flash_attention_2"
  trust_remote_code: false

dataset:
  path: "dataset/Math/train"
  max_seq_len: 1024
  num_workers: 2
  query_field: "query"
  response_field: "response"

training:
  batch_size: 64
  gradient_accumulation_steps: 1
  num_steps: 500
  learning_rate: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  type: "deepspeed_adam"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 4
  num_grad_slabs: 12

logging:
  log_interval: 1
  enable_timing: true
