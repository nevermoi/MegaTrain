# Llama 4 Scout Model Configuration (MoE)
#
# Architecture: 109B total params, ~17B active (16 experts, top-1 routing)
# Requires: transformers >= 4.51

model:
  name: "meta-llama/Llama-4-Scout-17B-16E-Instruct"
  dtype: "bfloat16"
  device: 0
  attn_implementation: "flash_attention_2"
  trust_remote_code: false

dataset:
  path: "dataset/Math/train"
  max_seq_len: 1024
  num_workers: 2
  query_field: "query"
  response_field: "response"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  num_steps: 200
  learning_rate: 5.0e-6
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

optimizer:
  type: "deepspeed_adam"
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

memory:
  checkpoint_interval: 2
  num_grad_slabs: 8

logging:
  log_interval: 1
  enable_timing: true
